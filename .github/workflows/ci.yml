name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check — server
        run: npx tsc -p tsconfig.server.json --noEmit

      - name: Type check — client
        run: npx tsc -p tsconfig.client.json --noEmit

      - name: Type check — CLI
        run: npx tsc -p tsconfig.cli.json --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client (Vite)
        run: npx vite build

      - name: Build server (tsc)
        run: npx tsc -p tsconfig.server.json

      - name: Build CLI (tsc)
        run: npx tsc -p tsconfig.cli.json
